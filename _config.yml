# Site Settings
title: "TrackAs"
description: "Get the latest trending news, viral stories, and exclusive tech updates from Assam."
url: "https://sakhan5240.github.io"
baseurl: "/trackassam"

# Global Author & Socials (Helps with Google Knowledge Graph)
author: "TrackAs Editorial Team"
twitter:
  username: "trackas" # Change or remove this if you don't have Twitter
social:
  name: "TrackAs"
  links:
    - https://twitter.com/trackas
    - https://www.facebook.com/trackas

# Plugins
plugins:
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-paginate

# Pagination Settings
paginate: 5
paginate_path: "/page:num/"

# Exclude files from the build
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor/
